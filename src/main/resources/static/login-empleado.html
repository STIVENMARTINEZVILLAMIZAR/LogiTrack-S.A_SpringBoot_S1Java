<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LogiTrack | Login Empleado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="auth-body relative overflow-hidden" data-role="EMPLEADO">
  <div class="grid-layer"></div>
  <div class="beam-layer"></div>
  <div class="vignette-layer"></div>
  <div class="noise-layer"></div>
  <div class="pointer-events-none absolute -top-32 -left-32 h-96 w-96 rounded-full bg-orange-300/35 blur-3xl animate-pulse"></div>
  <div class="pointer-events-none absolute top-20 right-0 h-[24rem] w-[24rem] rounded-full bg-yellow-300/30 blur-[80px] animate-pulse"></div>
  <div class="pointer-events-none absolute -bottom-40 left-1/3 h-[28rem] w-[28rem] rounded-full bg-amber-300/25 blur-[90px] animate-pulse"></div>
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo">
        <img src="img/logo.png" alt="LogiTrack logo" onerror="this.style.display='none'"/>
      </div>
      <div>
        <h2 class="auth-title">Acceso Empleado</h2>
        <p class="auth-subtitle">Consulta inventario y movimientos asignados.</p>
        <div id="loginRole" class="pill subtle" style="margin-top: 8px;">Modo: Empleado</div>
      </div>
    </div>

    <label for="baseUrl">Base URL</label>
    <input id="baseUrl" type="text" placeholder="http://localhost:8080" autocomplete="off"/>

    <label for="username">Usuario</label>
    <input id="username" type="text" autocomplete="username"/>

    <label for="password">Contrasena</label>
    <input id="password" type="password" autocomplete="current-password"/>

    <div class="row">
      <button class="primary" onclick="login()">Entrar</button>
    </div>

    <p class="muted">Tu acceso es operario, no puedes crear usuarios.</p>
    <div id="authStatus" class="status-line"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
