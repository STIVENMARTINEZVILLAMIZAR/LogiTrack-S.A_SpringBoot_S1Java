<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LogiTrack | Panel</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">📦</div>
        <div>
          <div class="brand-name">LogiTrack</div>
          <div class="brand-sub">Gestión de inventario</div>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-tab="bodegas" onclick="switchTab('bodegas')">Bodegas</button>
        <button class="nav-item" data-tab="productos" onclick="switchTab('productos')">Productos</button>
        <button class="nav-item" data-tab="movimientos" onclick="switchTab('movimientos')">Movimientos</button>
        <button class="nav-item" data-tab="auditoria" onclick="switchTab('auditoria')">Auditoría</button>
      </nav>
      <div class="sidebar-footer">
        <div class="pill" id="tokenStatus">Sesión</div>
        <button class="ghost" onclick="logout()">Salir</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <label class="label-inline">Base URL</label>
          <input id="baseUrl" class="input-inline" value="http://localhost:8080" onchange="guardarBaseUrl()"/>
        </div>
        <div class="topbar-right">
          <span class="muted">Usuario:</span>
          <span id="userLabel" class="pill">-</span>
        </div>
      </header>

      <section class="content">
        <div id="bodegas" class="tab-content active">
          <div class="card card-flat">
            <div class="card-header">
              <h3>Bodegas</h3>
              <div class="card-actions">
                <button class="primary" onclick="filtrarBodegas()">Actualizar</button>
              </div>
            </div>
            <div id="outBodegas" class="output"></div>
          </div>
        </div>

        <div id="productos" class="tab-content">
          <div class="card card-flat">
            <div class="card-header">
              <h3>Productos</h3>
              <div class="card-actions">
                <button class="primary" onclick="filtrarProductos()">Actualizar</button>
                <button class="ghost" onclick="filtrarStockBajo()">Stock bajo</button>
              </div>
            </div>
            <div id="outProductos" class="output"></div>
          </div>
        </div>

        <div id="movimientos" class="tab-content">
          <div class="card card-flat">
            <div class="card-header">
              <h3>Movimientos</h3>
              <div class="card-actions">
                <label class="label-inline">Desde</label>
                <input type="date" id="movDesde" class="input-inline"/>
                <label class="label-inline">Hasta</label>
                <input type="date" id="movHasta" class="input-inline"/>
                <button class="primary" onclick="filtrarMovimientos()">Filtrar</button>
              </div>
            </div>
            <div id="outMov" class="output"></div>
          </div>
        </div>

        <div id="auditoria" class="tab-content">
          <div class="card card-flat">
            <div class="card-header">
              <h3>Auditoría</h3>
              <div class="card-actions">
                <input id="audUser" class="input-inline" placeholder="Usuario ID" />
                <input id="audAccion" class="input-inline" placeholder="Acción (INSERT/UPDATE/...)"/>
                <button class="primary" onclick="filtrarAuditoria()">Filtrar</button>
              </div>
            </div>
            <div id="outAudit" class="output"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <template id="tableTemplate">
    <table class="data-table">
      <thead></thead>
      <tbody></tbody>
    </table>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
